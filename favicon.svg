<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="cg" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <radialGradient id="ng" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0abfc"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </radialGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#0a0010"/>
  <!-- Connection lines -->
  <line x1="16" y1="16" x2="6"  y2="7"  stroke="#7c3aed" stroke-width="1.2" stroke-opacity="0.7"/>
  <line x1="16" y1="16" x2="26" y2="7"  stroke="#7c3aed" stroke-width="1.2" stroke-opacity="0.7"/>
  <line x1="16" y1="16" x2="28" y2="18" stroke="#ec4899" stroke-width="1.2" stroke-opacity="0.7"/>
  <line x1="16" y1="16" x2="24" y2="27" stroke="#7c3aed" stroke-width="1.2" stroke-opacity="0.7"/>
  <line x1="16" y1="16" x2="8"  y2="27" stroke="#7c3aed" stroke-width="1.2" stroke-opacity="0.7"/>
  <line x1="16" y1="16" x2="4"  y2="18" stroke="#ec4899" stroke-width="1.2" stroke-opacity="0.7"/>
  <!-- Outer nodes -->
  <circle cx="6"  cy="7"  r="2.2" fill="#9333ea" opacity="0.9"/>
  <circle cx="26" cy="7"  r="2.2" fill="#9333ea" opacity="0.9"/>
  <circle cx="28" cy="18" r="2.0" fill="#ec4899" opacity="0.9"/>
  <circle cx="24" cy="27" r="2.2" fill="#9333ea" opacity="0.9"/>
  <circle cx="8"  cy="27" r="2.2" fill="#9333ea" opacity="0.9"/>
  <circle cx="4"  cy="18" r="2.0" fill="#ec4899" opacity="0.9"/>
  <!-- Central node with glow -->
  <circle cx="16" cy="16" r="5.5" fill="url(#cg)" opacity="0.25"/>
  <circle cx="16" cy="16" r="4"   fill="url(#ng)"/>
  <circle cx="14.5" cy="14.5" r="1.2" fill="white" opacity="0.5"/>
</svg>