<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="cg" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#e879f9"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
  </defs>
  <!-- Connection lines — bright, visible at 16px -->
  <line x1="16" y1="16" x2="5"  y2="6"  stroke="#a855f7" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="27" y2="6"  stroke="#a855f7" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="30" y2="17" stroke="#ec4899" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="25" y2="28" stroke="#a855f7" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="7"  y2="28" stroke="#a855f7" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="2"  y2="17" stroke="#ec4899" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Outer nodes — solid, bright -->
  <circle cx="5"  cy="6"  r="2.8" fill="#c084fc"/>
  <circle cx="27" cy="6"  r="2.8" fill="#c084fc"/>
  <circle cx="30" cy="17" r="2.5" fill="#f472b6"/>
  <circle cx="25" cy="28" r="2.8" fill="#c084fc"/>
  <circle cx="7"  cy="28" r="2.8" fill="#c084fc"/>
  <circle cx="2"  cy="17" r="2.5" fill="#f472b6"/>
  <!-- Central node — large, bright, clearly visible -->
  <circle cx="16" cy="16" r="5.5" fill="url(#cg)"/>
  <circle cx="14" cy="14" r="1.8" fill="white" opacity="0.55"/>
</svg>